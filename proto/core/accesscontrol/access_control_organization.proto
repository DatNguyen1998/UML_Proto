syntax = "proto3";

package core;

option go_package = "github.com/DatNguyen1998/UML_Proto/gen/go/core/accesscontrol;accesscontrol";

service AccessControlOrganizationService {
    rpc GetList(GetListRequest) returns (GetListResponse);
    rpc GetBySubdomain(GetBySubdomainRequest) returns (GetBySubdomainResponse);
}

message GetListRequest {
    bool is_active = 1; // Optional filter to get only active organizations
}

message GetListResponse {
    repeated Organization organizations = 1;
}

message GetBySubdomainRequest {
    string subdomain = 1;
}

message GetBySubdomainResponse {
    Organization organization = 1;
}

message Organization {
    string id = 1;
    string subdomain = 2;
    string name = 3;
    bool active = 4;
    string created_at = 5; // ISO 8601 format
    string updated_at = 6; // ISO 8601 format
}